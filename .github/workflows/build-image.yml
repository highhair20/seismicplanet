name: Build Pipeline Image

on:
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - "pyproject.toml"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev

    env:
      IMAGE_URI: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/seismicplanet/pipeline:latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pipeline/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_URI }}

      - name: Update Lambda functions
        continue-on-error: true  # functions may not exist yet on first bootstrap
        run: |
          aws lambda update-function-code \
            --function-name seismicplanet-pipeline \
            --image-uri $IMAGE_URI \
            --region ${{ vars.AWS_REGION }} \
            --no-cli-pager

          aws lambda update-function-code \
            --function-name seismicplanet-today \
            --image-uri $IMAGE_URI \
            --region ${{ vars.AWS_REGION }} \
            --no-cli-pager
