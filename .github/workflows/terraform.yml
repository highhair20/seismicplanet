name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for GitHub OIDC token issuance and PR comment posting
permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: infra

    env:
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      # Variables are resolved from the GitHub Environment (dev, staging, prod).
      # Each environment defines its own TF_ROLE_ARN, AWS_REGION, AWS_ACCOUNT_ID,
      # TF_PROJECT_NAME, and TF_BACKEND_CONF. To add an environment, create it in
      # GitHub → Settings → Environments and set these five variables.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config=${{ vars.TF_BACKEND_CONF }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="project_name=${{ vars.TF_PROJECT_NAME }}" \
            -var="role_arn=${{ vars.TF_ROLE_ARN }}" \
            -var="github_repo=${{ vars.TF_GITHUB_REPO }}" \
            -no-color \
            -out=tfplan

      - name: Render Plan
        if: github.event_name == 'pull_request'
        run: terraform show -no-color tfplan > $GITHUB_WORKSPACE/plan.txt

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(process.env.GITHUB_WORKSPACE + '/plan.txt', 'utf8');
            const maxLength = 65000;
            const body = plan.length > maxLength
              ? `#### Terraform Plan\n\`\`\`\n${plan.substring(0, maxLength)}\n...(truncated)\n\`\`\``
              : `#### Terraform Plan\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # Applies only on merge to main. Add a required reviewer to the GitHub
      # Environment to gate applies behind manual approval.
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
