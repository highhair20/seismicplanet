apiVersion: batch/v1
kind: CronJob
metadata:
  name: pipeline
  namespace: seismicplanet
spec:
  # 01:00 UTC daily — after USGS publishes the previous day's events
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pipeline
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              # Replace with the value of `terraform output ecr_repository_url`
              image: 634157847749.dkr.ecr.us-east-1.amazonaws.com/seismicplanet/pipeline:latest
              env:
                - name: S3_BUCKET
                  value: seismicplanet
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
